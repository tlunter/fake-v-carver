<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dark background -->
  <rect width="48" height="48" rx="10" fill="#0f0f0f"/>
  <!-- V-bit cross-section: two angled lines meeting at a point -->
  <path d="M8 10 L24 38 L40 10" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Offset ring 1 -->
  <path d="M13 10 L24 32 L35 10" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Offset ring 2 -->
  <path d="M18 10 L24 26 L30 10" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>
